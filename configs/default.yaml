# ============================================================
# HybridSwinNet — Default Configuration
# NTIRE 2026 Deepfake Detection
# ============================================================

model:
  # swinv2_base_window8_256.ms_in1k: pretrained on ImageNet-1k, window=8 fits 224px cleanly.
  # Alternative (if VRAM allows): swinv2_base_window12to16_192to256.ms_in22k_ft_in1k
  swinv2_variant: "swinv2_base_window8_256.ms_in1k"
  pretrained: true
  freq_embed_dim: 512
  fusion_d_model: 512
  fusion_heads: 8
  # Increased from 0.1 → 0.3 to fight overfitting on the small dataset
  fusion_dropout: 0.3

training:
  epochs: 60                # Budget increased but early stopping kicks in
  batch_size: 4             # RTX 3050 4GB: Swin-B needs small batches; use gradient_accumulation_steps to compensate
  gradient_accumulation_steps: 4   # effective batch = 4 × 4 = 16
  lr: 1.0e-4
  # Increased from 1e-4 → 5e-3: stronger L2 regularisation for 800-sample dataset
  weight_decay: 5.0e-3
  # Layer-wise LR decay: backbone stages get lr × decay^depth (0.75 ≈ 4 layers → 32% of head LR)
  layer_lr_decay: 0.75
  # Degradation Pipeline (Spec.md §4.1)
  jpeg_qf_range: [30, 60]
  blur_limit: [3, 7]
  downscale_target_px: 64          # 224 → 64 → 224
  # Gradient checkpointing on Swin backbone (saves ~50% activation VRAM, ~30% slower)
  grad_checkpoint: true
  # GPU memory allocator — reduces fragmentation on small VRAM budgets
  cuda_alloc_conf: "expandable_segments:True"
  # FMSI (Spec.md §4.2) — raised from 0.15 → 0.30 for stronger frequency regularisation
  fmsi_mask_ratio: 0.30
  # LR schedule
  lr_scheduler: "cosine"
  # Mixed precision (requires CUDA)
  amp: true
  # Gradient clipping (prevents exploding gradients with Swin)
  grad_clip: 1.0
  # Stratified internal split from training_data_final/ (val has no labels)
  val_split: 0.2
  val_split_seed: 42
  # Checkpointing
  checkpoint_dir: "checkpoints/"
  save_metric: "val_auc"
  # --- Anti-overfitting additions ---
  # Label smoothing ε: converts hard 0/1 targets to 0.05/0.95, prevents overconfidence
  label_smoothing: 0.1
  # Mixup: linearly interpolates pairs of training samples and their labels
  mixup_alpha: 0.4
  # Early stopping: halt training if val AUC hasn't improved for this many epochs
  early_stopping_patience: 8

data:
  image_size: 256            # Swin V2 window8 native resolution (256×256)
  # training_data_final/ has 1000 labelled images (500 real, 500 fake)
  train_dir: "data/trainval_data_final/training_data_final"
  # validation_data_final/ is the competition's blind test set (no labels)
  test_dir:  "data/trainval_data_final/validation_data_final"
  num_workers: 8
  pin_memory: true

evaluation:
  jpeg_robustness_qf: 50           # QF used in cross-degradation eval
  output_dir: "results/"
  submission_dir: "submissions/"

logging:
  use_wandb: false
  project: "ntire2026-deepfake"
  run_name: "hybrid-swin-v2-antioverfitting"
