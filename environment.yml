name: ivp-deepfake
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip

  # Install PyTorch with CUDA 12.4 support via conda for best driver compatibility
  - pytorch::pytorch>=2.5.1
  - pytorch::torchvision>=0.20.1
  - pytorch::torchaudio>=2.5.1
  - pytorch::pytorch-cuda=12.4

  - pip:
    # Model backbone
    - timm>=1.0.12

    # Augmentation
    - albumentations>=2.0.5
    - opencv-python-headless>=4.10.0.84

    # Metrics & experiment tracking
    - torchmetrics>=1.6.1
    - wandb>=0.19.1

    # Config & utilities
    - pyyaml>=6.0.2
    - numpy>=2.0.2
    - Pillow>=11.1.0
    - matplotlib>=3.10.0
    - tqdm>=4.67.1
    - scikit-learn>=1.6.1
